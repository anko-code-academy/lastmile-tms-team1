name: Web CI

on:
  push:
    branches: [main]
    paths: [src/web/**]
  pull_request:
    branches: [main]
    paths: [src/web/**]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: src/web/package-lock.json

      - name: Install
        run: npm ci
        working-directory: src/web

      - name: Lint
        run: npm run lint
        working-directory: src/web

      - name: Build
        run: npm run build
        working-directory: src/web
