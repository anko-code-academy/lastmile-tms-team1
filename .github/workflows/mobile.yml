name: Mobile CI

on:
  push:
    branches: [main]
    paths: [src/mobile/**]
  pull_request:
    branches: [main]
    paths: [src/mobile/**]

jobs:
  typecheck:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: src/mobile/package-lock.json

      - name: Install
        run: npm ci --legacy-peer-deps
        working-directory: src/mobile

      - name: TypeScript check
        run: npx tsc --noEmit
        working-directory: src/mobile
